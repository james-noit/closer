<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <h1 class="app-title">Closer ❤️</h1>
        <p class="subtitle">Stay connected with the people who matter</p>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Invalid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
          <mat-icon *ngIf="!loading">login</mat-icon>
          <mat-spinner *ngIf="loading" diameter="20" class="inline-spinner"></mat-spinner>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="sso-buttons">
        <button mat-stroked-button class="google-btn full-width" (click)="loginWithGoogle()">
          <span class="google-icon">G</span>
          Continue with Google
        </button>

        <button mat-stroked-button class="github-btn full-width" (click)="loginWithGithub()">
          <mat-icon>code</mat-icon>
          Continue with GitHub
        </button>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <p class="register-link">Don't have an account? <a routerLink="/register">Sign up</a></p>
    </mat-card-actions>
  </mat-card>
</div>
