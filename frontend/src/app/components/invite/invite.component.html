<div class="invite-container">
  <h2>Invite Friends</h2>

  <mat-card class="invite-card">
    <mat-card-header><mat-card-title>Invite by Email</mat-card-title></mat-card-header>
    <mat-card-content>
      <form [formGroup]="inviteForm" (ngSubmit)="sendInvite()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Friend's Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="inviteForm.invalid">
          Send Invitation
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="invite-card">
    <mat-card-header><mat-card-title>Share Link</mat-card-title></mat-card-header>
    <mat-card-content>
      <div class="share-url">{{ shareUrl }}</div>
      <div class="share-buttons">
        <button mat-raised-button class="whatsapp-btn" (click)="shareOnWhatsApp()">
          <mat-icon>chat</mat-icon> WhatsApp
        </button>
        <button mat-raised-button class="telegram-btn" (click)="shareOnTelegram()">
          <mat-icon>send</mat-icon> Telegram
        </button>
        <button mat-raised-button (click)="copyLink()">
          <mat-icon>content_copy</mat-icon> Copy Link
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
