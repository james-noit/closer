<mat-toolbar color="primary" class="header-toolbar">
  <a routerLink="/dashboard" class="logo-link">
    <span class="logo">Closer ❤️</span>
  </a>

  <span class="spacer"></span>

  <nav class="nav-links" *ngIf="currentUser">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon>
      <span class="nav-text">Dashboard</span>
    </a>
    <a mat-button routerLink="/contacts" routerLinkActive="active-link">
      <mat-icon>people</mat-icon>
      <span class="nav-text">Contacts</span>
    </a>
    <a mat-button routerLink="/messages" routerLinkActive="active-link">
      <mat-icon>message</mat-icon>
      <span class="nav-text">Messages</span>
    </a>
    <a mat-button routerLink="/reminders" routerLinkActive="active-link">
      <mat-icon>notifications</mat-icon>
      <span class="nav-text">Reminders</span>
    </a>
  </nav>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" *ngIf="currentUser">
    <div class="avatar">{{ getInitials() }}</div>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="/settings">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item routerLink="/invite">
      <mat-icon>person_add</mat-icon>
      <span>Invite Friends</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
