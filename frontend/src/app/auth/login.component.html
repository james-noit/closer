<div class="login-container">
  <h1>Iniciar sesión</h1>
  <div class="d-flex justify-content-center align-items-center">
    <img src="/CloserLogo.png" alt="Logo de Closer" class="login-logo" />
  </div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="username">Usuario</label>
      <input id="username" formControlName="username" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password" />
    </div>

    <button type="submit" [disabled]="form.invalid || loading()">
      <span *ngIf="!loading()">Entrar</span>
      <span *ngIf="loading()" class="spinner" aria-label="Cargando"></span>
    </button>
  </form>

  <div class="error-card" *ngIf="errorTitle()" role="alert">
    <strong>{{ errorTitle() }}</strong>
    <p *ngIf="errorDetail()">{{ errorDetail() }}</p>
  </div>
</div>
